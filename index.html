<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: -apple-system, sans-serif;
  background: #fefefe;
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: 80px auto;
  padding: 25px;
  border: 3px solid black;
  background: #fff;
  box-shadow: 8px 8px 0px black;
  text-align: center;
}

/* TITLE */
h2 {
  margin-bottom: 20px;
  font-weight: 900;
}

/* INPUTS */
input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border: 3px solid black;
  border-radius: 0;
  font-size: 14px;
  background: #fff;
}

/* BUTTON */
button {
  padding: 12px 20px;
  margin-top: 10px;
  border: 3px solid black;
  background: #ffcc00;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 4px 4px 0px black;
  transition: 0.1s;
}

button:active {
  transform: translate(4px, 4px);
  box-shadow: 0px 0px 0px black;
}

/* LIST */
ul {
  padding: 0;
}

li {
  list-style: none;
  background: #e6f0ff;
  margin: 10px 0;
  padding: 12px;
  border: 3px solid black;
  box-shadow: 4px 4px 0px black;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* DELETE BUTTON */
li button {
  background: #ff4d4d;
  color: white;
  padding: 5px 10px;
}

/* TOTAL */
h3 {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>EXPENSE TRACKER</h2>

<input id="amount" placeholder="Amount"><br>
<input id="category" placeholder="Category"><br>
<input id="date" type="date"><br>

<button onclick="add()">ADD</button>

<h3>Total: ₹<span id="total"></span></h3>
<ul id="list"></ul>

</div>

<script>
async function add(){
  const exp = {
    amount: document.getElementById("amount").value,
    category: document.getElementById("category").value,
    date: document.getElementById("date").value
  };

  await fetch("http://localhost:3000/expenses", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(exp)
  });

  load();
}

async function load(){
  const res = await fetch("http://localhost:3000/expenses");
  const data = await res.json();

  let total = 0;
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(e => {
    total += Number(e.amount);
    list.innerHTML += `<li>${e.category} ₹${e.amount}
    <button onclick="del('${e._id}')">X</button></li>`;
  });

  document.getElementById("total").innerText = total;
}

async function del(id){
  await fetch("http://localhost:3000/expenses/"+id, {
    method: "DELETE"
  });
  load();
}

load();
</script>

</body>
</html>
